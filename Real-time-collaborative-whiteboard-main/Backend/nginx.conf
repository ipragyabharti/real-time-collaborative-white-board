# WhiteRoom — Nginx load balancer config
# Handles: sticky sessions, WebSocket upgrade, health checks, rate limiting

worker_processes auto;

events {
    worker_connections 4096;
}

http {

    # ── Rate limiting (connection-level, before it hits your app) ─────────
    # Allows 10 requests/sec per IP, bursts up to 20
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Upstream — your Express/Socket.io instances ───────────────────────
    upstream whiteroom_backend {
        # ip_hash = sticky sessions
        # Same IP always hits the same server — required for WebSocket handshake continuity
        # Redis handles cross-server state; ip_hash handles connection continuity
        ip_hash;

        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
        server 127.0.0.1:3003;

        # keepalive — reuse upstream connections instead of opening new ones per request
        keepalive 64;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ── Main server block ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name yourdomain.com;

        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Health check endpoint (internal only) ─────────────────────────
        # Nginx itself polls /health on each backend to know if it's alive
        # You can also hit https://yourdomain.com/health from a monitoring tool
        location = /health {
            proxy_pass http://whiteroom_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Socket.io — WebSocket + polling fallback ──────────────────────
        location /socket.io/ {
            proxy_pass http://whiteroom_backend;

            # WebSocket upgrade headers — required for socket.io
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass real client IP to your app (used in logging + rate limiter)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            # Keep WebSocket connections alive for up to 24h
            # Without this Nginx will close idle connections after 60s
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;

            # Disable buffering — essential for real-time traffic
            # Buffering adds latency and breaks streaming events
            proxy_buffering off;
        }

        # ── All other HTTP routes (REST endpoints if you add any) ─────────
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://whiteroom_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}